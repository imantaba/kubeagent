name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag, e.g. v1.2.3"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Secrets are not readable in step-level `if:` — surface presence via env.
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve version
        id: ver
        run: echo "version=${{ github.event.inputs.version || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: go test ./...

      - name: Build linux/amd64
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-X main.version=${VERSION}" -o kubeagent .

      - name: Package + checksums
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          tar -czf "kubeagent_${VERSION}_linux_amd64.tar.gz" kubeagent README.md
          # Unversioned copy so releases/latest/download/kubeagent_linux_amd64.tar.gz
          # always resolves to the newest release (used by the README quick-install).
          cp "kubeagent_${VERSION}_linux_amd64.tar.gz" kubeagent_linux_amd64.tar.gz
          sha256sum "kubeagent_${VERSION}_linux_amd64.tar.gz" > SHA256SUMS
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: |
            kubeagent_${{ steps.ver.outputs.version }}_linux_amd64.tar.gz
            kubeagent_linux_amd64.tar.gz
            SHA256SUMS

      # Container image for the watch daemon (deploy/deployment.yaml pulls this).
      # Skipped when the Docker Hub secrets are not configured, so the release
      # still succeeds without them. Requires repo secrets:
      #   DOCKERHUB_USERNAME (imantaba) and DOCKERHUB_TOKEN (a Read/Write access token).
      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        run: echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Build + push image
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          docker build -t "imantaba/kubeagent:${VERSION}" --build-arg VERSION="${VERSION}" .
          docker tag "imantaba/kubeagent:${VERSION}" imantaba/kubeagent:latest
          docker push "imantaba/kubeagent:${VERSION}"
          docker push imantaba/kubeagent:latest
