{{- if .Values.rbac.create -}}
# Strictly read-only: get/list/watch only. No create/update/patch/delete anywhere.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubeagent.fullname" . }}
  labels:
    {{- include "kubeagent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods, nodes, services, configmaps, events]
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources: [deployments, replicasets, statefulsets, daemonsets]
    verbs: [get, list, watch]
  - apiGroups: ["batch"]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  - apiGroups: ["discovery.k8s.io"]
    resources: [endpointslices]
    verbs: [get, list, watch]
  - apiGroups: ["networking.k8s.io"]
    resources: [networkpolicies, ingressclasses]
    verbs: [get, list, watch]
  - apiGroups: ["storage.k8s.io"]
    resources: [storageclasses]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubeagent.fullname" . }}
  labels:
    {{- include "kubeagent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubeagent.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubeagent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
