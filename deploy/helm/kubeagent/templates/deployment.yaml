apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeagent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeagent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubeagent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubeagent.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kubeagent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: kubeagent
          image: {{ include "kubeagent.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "watch"
            - "--metrics-addr=:{{ .Values.metricsPort }}"
            - "--heartbeat={{ .Values.watch.heartbeat }}"
            - "--debounce={{ .Values.watch.debounce }}"
            {{- if .Values.watch.namespace }}
            - "--namespace={{ .Values.watch.namespace }}"
            {{- end }}
          {{- if .Values.diskUsage.enabled }}
          env:
            - name: KUBEAGENT_DISK_USAGE
              value: "true"
            - name: KUBEAGENT_DISK_THRESHOLD
              value: {{ .Values.diskUsage.threshold | quote }}
          {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metricsPort }}
          readinessProbe:
            httpGet: { path: /readyz, port: metrics }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: metrics }
            initialDelaySeconds: 10
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
