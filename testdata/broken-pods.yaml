apiVersion: v1
kind: Pod
metadata:
  name: bad-image
  namespace: kubeagent-test
spec:
  containers:
    - name: app
      image: does-not-exist.example.com/nope:latest
---
apiVersion: v1
kind: Pod
metadata:
  name: crash-loop
  namespace: kubeagent-test
spec:
  containers:
    - name: app
      image: busybox
      command: ["sh", "-c", "echo starting; exit 1"]
---
apiVersion: v1
kind: Pod
metadata:
  name: unschedulable
  namespace: kubeagent-test
spec:
  nodeSelector:
    kubeagent.example/nonexistent: "true"
  containers:
    - name: app
      image: busybox
      command: ["sleep", "3600"]
---
apiVersion: v1
kind: Pod
metadata:
  name: oom-killed
  namespace: kubeagent-test
spec:
  containers:
    - name: app
      image: busybox
      # The container starts cheaply, then `tail /dev/zero` buffers an endless
      # stream into memory and grows past the limit, so the cgroup OOM-kills the
      # running process — a clean OOMKilled (exit 137), not an init StartError.
      # (A too-low limit OOM-kills during init instead and shows as CrashLoop.)
      command: ["sh", "-c", "tail /dev/zero"]
      resources:
        limits:
          memory: 64Mi
        requests:
          memory: 64Mi
