<svg xmlns="http://www.w3.org/2000/svg" viewBox="15 28 108 76" fill="none">
  <defs>
    <linearGradient id="kg-ind" gradientUnits="userSpaceOnUse" x1="20" y1="32" x2="116" y2="96">
      <stop offset="0" stop-color="#5865d8"/>
      <stop offset="1" stop-color="#2f3aa0"/>
    </linearGradient>
  </defs>

  <g stroke="url(#kg-ind)" stroke-linecap="round" stroke-linejoin="round">
    <!-- ===== K ===== -->
    <line x1="23" y1="36" x2="23" y2="88" stroke-width="8"/>
    <line x1="25" y1="62" x2="46" y2="37" stroke-width="8"/>
    <line x1="25" y1="62" x2="46" y2="88" stroke-width="8"/>

    <!-- ===== G : Kubernetes helm wheel ===== -->
    <!-- wheel rim -->
    <circle cx="82" cy="62" r="24" stroke-width="7"/>
    <!-- magnifying-glass handle (read-only inspection) -->
    <line x1="101" y1="81" x2="115" y2="95" stroke-width="8"/>
    <!-- G crossbar -->
    <line x1="88" y1="62" x2="102" y2="62" stroke-width="6"/>
    <!-- 7 helm spokes -->
    <line x1="82" y1="55" x2="82" y2="43" stroke-width="3.4"/>
    <line x1="87.5" y1="57.6" x2="96.9" y2="50.2" stroke-width="3.4"/>
    <line x1="88.8" y1="63.6" x2="100.5" y2="66.2" stroke-width="3.4"/>
    <line x1="85.0" y1="68.3" x2="90.2" y2="79.1" stroke-width="3.4"/>
    <line x1="79.0" y1="68.3" x2="73.8" y2="79.1" stroke-width="3.4"/>
    <line x1="75.2" y1="63.6" x2="63.5" y2="66.2" stroke-width="3.4"/>
    <line x1="76.5" y1="57.6" x2="67.2" y2="50.2" stroke-width="3.4"/>
  </g>

  <!-- spoke-end balls -->
  <g fill="url(#kg-ind)">
    <circle cx="82" cy="43" r="2.4"/>
    <circle cx="96.9" cy="50.2" r="2.4"/>
    <circle cx="100.5" cy="66.2" r="2.4"/>
    <circle cx="90.2" cy="79.1" r="2.4"/>
    <circle cx="73.8" cy="79.1" r="2.4"/>
    <circle cx="63.5" cy="66.2" r="2.4"/>
    <circle cx="67.2" cy="50.2" r="2.4"/>
  </g>

  <!-- hub = emerald "scan point" (health) -->
  <circle cx="82" cy="62" r="4.6" fill="#10b981"/>
</svg>
